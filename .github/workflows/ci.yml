name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: engram
          POSTGRES_PASSWORD: engram
          POSTGRES_DB: engram_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        env:
          TEST_DATABASE_URL: postgres://engram:engram@localhost:5432/engram_test?sslmode=disable
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage gate (60% minimum)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          awk "BEGIN { if (${COVERAGE}+0 < 60) { print \"FAIL: coverage \" ${COVERAGE} \"% is below the 60% threshold\"; exit 1 } else { print \"PASS: coverage \" ${COVERAGE} \"% meets the 60% threshold\" } }"

      - name: Vet
        run: go vet ./...
