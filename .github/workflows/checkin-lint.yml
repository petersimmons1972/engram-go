name: checkin-lint

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  checkin-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ripgrep
      - name: Run checkin-lint
        run: bin/checkin-lint.sh
