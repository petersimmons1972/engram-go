  # --- Generation: RX 7900 XT (display card — small model only, display uses ~4GB VRAM) ---
  - model_name: qwen3:8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: os.environ/LEVIATHAN_OLLAMA_URL

  # --- Summarization: RX 7900 XT ---
  - model_name: llama3.2:3b
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: os.environ/LEVIATHAN_OLLAMA_URL

  # --- Embedding: RX 7900 XT (weight 4) ---
  - model_name: snowflake-arctic-embed2
    litellm_params:
      model: ollama/snowflake-arctic-embed2
      api_base: os.environ/LEVIATHAN_OLLAMA_URL
      weight: 4
    model_info:
      mode: embedding

  # --- Embedding: W6800 (weight 1) ---
  - model_name: snowflake-arctic-embed2
    litellm_params:
      model: ollama/snowflake-arctic-embed2
      api_base: os.environ/PRECISION_OLLAMA_URL
      weight: 1
    model_info:
      mode: embedding

  # --- Embedding: Jina v4 retrieval (Q8 GGUF, 2048-dim native, Matryoshka→1024) ---
  # RX 7900 XT (weight 2)
  - model_name: jina-embeddings-v4
    litellm_params:
      model: ollama/diqiuzhuanzhuan/jina-embeddings-v4-text-retrieval-Q8_0.gguf:latest
      api_base: os.environ/LEVIATHAN_OLLAMA_URL
      weight: 2
    model_info:
      mode: embedding
  # W6800 (weight 2)
  - model_name: jina-embeddings-v4
    litellm_params:
      model: ollama/diqiuzhuanzhuan/jina-embeddings-v4-text-retrieval-Q8_0.gguf:latest
      api_base: os.environ/PRECISION_OLLAMA_URL
      weight: 2
    model_info:
      mode: embedding
  # MI50 / Radeon VII (weight 1 — added once container confirms GPU mode)
  - model_name: jina-embeddings-v4
    litellm_params:
      model: ollama/diqiuzhuanzhuan/jina-embeddings-v4-text-retrieval-Q8_0.gguf:latest
      api_base: os.environ/PRECISION_MI50_OLLAMA_URL
      weight: 1
    model_info:
      mode: embedding

router_settings:
  routing_strategy: least-busy
  num_retries: 0
  retry_after: 0

litellm_settings:
  drop_params: true
  request_timeout: 600
