<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow-solid" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#1f6feb"/>
    </marker>
  </defs>

  <!-- LAYER 1: BACKGROUND -->
  <rect width="1000" height="500" fill="#0d1117"/>

  <!-- LAYER 2: GEOMETRY — boxes drawn before text -->

  <!-- Column 1: AI Client boxes -->
  <!-- Claude Code box -->
  <rect x="30" y="72" width="150" height="44" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Cursor box -->
  <rect x="30" y="128" width="150" height="44" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- VS Code box -->
  <rect x="30" y="184" width="150" height="44" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Claude Desktop box -->
  <rect x="30" y="240" width="150" height="44" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Column 2: engram-go main container -->
  <rect x="330" y="55" width="230" height="330" rx="10" ry="10" fill="#1f2937" stroke="#3fb950" stroke-width="2"/>
  <!-- Search Engine sub-box -->
  <rect x="350" y="105" width="190" height="80" rx="6" ry="6" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <!-- Summarize Worker sub-box -->
  <rect x="350" y="205" width="190" height="50" rx="6" ry="6" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <!-- Claude Advisor sub-box (dashed) -->
  <rect x="350" y="275" width="190" height="50" rx="6" ry="6" fill="#161b22" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Column 3: Storage boxes -->
  <!-- PostgreSQL box -->
  <rect x="700" y="60" width="180" height="80" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Ollama box -->
  <rect x="700" y="165" width="180" height="70" rx="7" ry="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Anthropic API box (dashed) -->
  <rect x="700" y="260" width="180" height="70" rx="7" ry="7" fill="#161b22" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- LAYER 3: ARROWS -->

  <!-- Client to engram-go arrows (solid green) — MCP/SSE label on middle arrow -->
  <!-- Claude Code arrow (y center = 94) -->
  <line x1="182" y1="94" x2="326" y2="94" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <!-- Cursor arrow (y center = 150) -->
  <line x1="182" y1="150" x2="326" y2="150" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <!-- VS Code arrow (y center = 206) -->
  <line x1="182" y1="206" x2="326" y2="206" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <!-- Claude Desktop arrow (y center = 262) -->
  <line x1="182" y1="262" x2="326" y2="262" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- engram-go to PostgreSQL arrow (solid, y center = 100) -->
  <line x1="562" y1="100" x2="696" y2="100" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <!-- engram-go to Ollama arrow (solid, y center = 200) -->
  <line x1="562" y1="200" x2="696" y2="200" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <!-- engram-go to Anthropic API arrow (dashed blue) -->
  <line x1="562" y1="295" x2="696" y2="295" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>

  <!-- LAYER 4: TEXT — always last -->

  <!-- Section header labels -->
  <text x="105" y="52" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" font-weight="600" letter-spacing="0.5">AI Clients</text>
  <text x="445" y="38" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" font-weight="600" letter-spacing="0.5">engram-go</text>
  <text x="790" y="38" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" font-weight="600" letter-spacing="0.5">Storage</text>

  <!-- Client box labels -->
  <text x="105" y="99" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" fill="#e6edf3">Claude Code</text>
  <text x="105" y="155" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" fill="#e6edf3">Cursor</text>
  <text x="105" y="211" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" fill="#e6edf3">VS Code</text>
  <text x="105" y="267" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" fill="#e6edf3">Claude Desktop</text>

  <!-- MCP/SSE label on arrows — centered between col1 right edge and col2 left edge -->
  <text x="254" y="178" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">MCP/SSE</text>

  <!-- engram-go interior labels -->
  <text x="445" y="82" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#ffffff">MCP Server</text>

  <!-- Search Engine sub-box -->
  <text x="445" y="124" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#8b949e">Search Engine</text>
  <text x="445" y="148" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">BM25 | Vector | Recency | Graph</text>
  <text x="445" y="168" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">Hybrid scoring + rerank</text>

  <!-- Summarize Worker sub-box -->
  <text x="445" y="227" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#8b949e">Summarize Worker</text>
  <text x="445" y="244" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">Background consolidation</text>

  <!-- Claude Advisor sub-box -->
  <text x="445" y="297" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#8b949e">Claude Advisor</text>
  <text x="445" y="314" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">Optional intelligence layer</text>

  <!-- PostgreSQL box labels -->
  <text x="790" y="91" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#e6edf3">PostgreSQL</text>
  <text x="790" y="110" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">memories - chunks - graph</text>
  <text x="790" y="127" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">pgvector + pg_trgm</text>

  <!-- Ollama box labels -->
  <text x="790" y="196" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Ollama</text>
  <text x="790" y="216" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">embedding inference</text>

  <!-- Anthropic API box labels -->
  <text x="790" y="291" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Anthropic API</text>
  <text x="790" y="311" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#6e7681">Claude Advisor (optional)</text>

  <!-- Footer version label -->
  <text x="500" y="478" text-anchor="middle" font-family="Inter, 'Segoe UI', sans-serif" font-size="11" fill="#484f58">engram-go v3.0 architecture</text>
</svg>
