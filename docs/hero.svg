<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="engram-go v2.0 hero banner">
  <defs>
    <!-- Accent gradient bar: Go cyan to GitHub green -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="1"/>
    </linearGradient>
    <!-- Subtle vignette to give depth without decoration -->
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161b22" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <!-- Go accent block inner glow -->
    <linearGradient id="goBlockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0090b8" stop-opacity="1"/>
    </linearGradient>
    <!-- Badge gradient for subtle depth -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2128" stop-opacity="1"/>
      <stop offset="100%" stop-color="#161b22" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- ============================================================ -->
  <!-- LAYER 1: BACKGROUNDS                                         -->
  <!-- ============================================================ -->

  <!-- Base canvas fill -->
  <rect x="0" y="0" width="1200" height="280" fill="#0d1117"/>

  <!-- Subtle vignette overlay -->
  <rect x="0" y="0" width="1200" height="280" fill="url(#bgVignette)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: GEOMETRY — Go accent block, badge rects, divider    -->
  <!-- ============================================================ -->

  <!-- Go accent block — rounded rect with Go brand color -->
  <rect x="52" y="100" width="72" height="48" rx="10" ry="10" fill="url(#goBlockGrad)"/>

  <!-- Badge 1: ~10 MB container -->
  <rect x="780" y="168" width="114" height="32" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Badge 2: ~200ms startup -->
  <rect x="905" y="168" width="114" height="32" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Badge 3: 19 MCP tools -->
  <rect x="1030" y="168" width="114" height="32" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Accent gradient rule — thin horizontal line below tagline -->
  <rect x="80" y="210" width="1040" height="3" rx="1" ry="1" fill="url(#accentGrad)"/>

  <!-- Subtle separator between left accent and center content -->
  <line x1="148" y1="90" x2="148" y2="210" stroke="#21262d" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LAYER 3: STROKES — none additional needed                    -->
  <!-- ============================================================ -->

  <!-- ============================================================ -->
  <!-- LAYER 4: TEXT — all text drawn last, nothing occludes it     -->
  <!-- ============================================================ -->

  <!-- Go accent block label -->
  <text
    x="88"
    y="131"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#0d1117"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="1">Go</text>

  <!-- Main wordmark: "engram" -->
  <text
    x="600"
    y="108"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2">engram</text>

  <!-- Subtitle: project description -->
  <text
    x="600"
    y="155"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="0.3">Persistent Memory for AI Agents</text>

  <!-- Tagline: version and stack -->
  <text
    x="600"
    y="185"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="500"
    fill="#3fb950"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="0.8">v2.0  |  Go.  Fast.  Reliable.</text>

  <!-- Badge 1 label -->
  <text
    x="837"
    y="184"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">~10 MB container</text>

  <!-- Badge 2 label -->
  <text
    x="962"
    y="184"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">~200ms startup</text>

  <!-- Badge 3 label -->
  <text
    x="1087"
    y="184"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">19 MCP tools</text>

  <!-- Small version callout below accent rule -->
  <text
    x="600"
    y="236"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="12"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="1.5">ENGRAM-GO  |  github.com/psimmons/engram-go</text>

</svg>
