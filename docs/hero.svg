<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="engram-go v3.0 hero banner">
  <defs>
    <!-- Accent gradient bar: recency blue to cosine green -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="1"/>
    </linearGradient>
    <!-- Subtle vignette to give depth without decoration -->
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161b22" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <!-- Go accent block inner glow -->
    <linearGradient id="goBlockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0090b8" stop-opacity="1"/>
    </linearGradient>
    <!-- Badge gradient for subtle depth -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2128" stop-opacity="1"/>
      <stop offset="100%" stop-color="#161b22" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- ============================================================ -->
  <!-- LAYER 1: BACKGROUNDS                                         -->
  <!-- ============================================================ -->

  <!-- Base canvas fill -->
  <rect x="0" y="0" width="1200" height="340" fill="#0d1117"/>

  <!-- Subtle vignette overlay -->
  <rect x="0" y="0" width="1200" height="340" fill="url(#bgVignette)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: GEOMETRY                                            -->
  <!-- ============================================================ -->


  <!-- Badge 1: ~10 MB container — centered trio -->
  <rect x="405" y="262" width="120" height="36" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Badge 2: ~200ms startup -->
  <rect x="540" y="262" width="120" height="36" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Badge 3: 35 MCP tools -->
  <rect x="675" y="262" width="120" height="36" rx="6" ry="6" fill="url(#badgeGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Accent gradient rule — separates content from footer -->
  <rect x="80" y="252" width="1040" height="3" rx="1" ry="1" fill="url(#accentGrad)"/>


  <!-- ============================================================ -->
  <!-- LAYER 4: TEXT — all text drawn last                          -->
  <!-- ============================================================ -->

  <!-- Main wordmark: "engram-go" -->
  <text
    x="600"
    y="118"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="88"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2">engram<tspan fill="#00ADD8">-go</tspan></text>

  <!-- Subtitle: project description -->
  <text
    x="600"
    y="174"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="0.3">Persistent Memory for AI Agents</text>

  <!-- Tagline: LOCAL-ONLY — the key differentiator -->
  <text
    x="600"
    y="218"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="700"
    fill="#ff6b6b"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="0.8">LOCAL-ONLY  ·  No cloud accounts  ·  No API keys  ·  No telemetry</text>

  <!-- Badge 1 label -->
  <text
    x="465"
    y="280"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">~10 MB</text>

  <!-- Badge 2 label -->
  <text
    x="600"
    y="280"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">~200ms start</text>

  <!-- Badge 3 label -->
  <text
    x="735"
    y="280"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="central">35 MCP tools</text>

  <!-- Footer: version + repo -->
  <text
    x="600"
    y="320"
    font-family="Inter, 'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="14"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="1.5">v3.0  ·  ENGRAM-GO  ·  github.com/petersimmons1972/engram-go</text>

</svg>
