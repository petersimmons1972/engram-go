<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="100%" role="img" aria-label="Knowledge Graph: Pull in Context Automatically">
  <defs>
    <!-- Arrowhead markers — one per color -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#f85149"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#f0883e"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-faint" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#30363d"/>
    </marker>
  </defs>

  <!-- 1. BACKGROUND -->
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- 2. GEOMETRY — edges drawn before node fills so nodes occlude edge endpoints -->

  <!-- Edge: Query node -> Central match node (blue, solid) -->
  <line x1="123" y1="200" x2="253" y2="200"
        stroke="#58a6ff" stroke-width="1.5"
        marker-end="url(#arrow-blue)"/>

  <!-- Edge: Central -> Auth middleware bug (red, dashed) -->
  <!-- From top edge of central rect (340, 173) to bottom edge of top-right rect (600, 129) -->
  <line x1="380" y1="173" x2="545" y2="129"
        stroke="#f85149" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arrow-red)"/>

  <!-- Edge: Central -> Token expiry pattern (green, solid) -->
  <!-- From right edge of central rect (425, 200) to left edge of right rect (532, 200) -->
  <line x1="425" y1="200" x2="530" y2="200"
        stroke="#3fb950" stroke-width="1.5"
        marker-end="url(#arrow-green)"/>

  <!-- Edge: Central -> httpOnly cookie rule (amber, solid) -->
  <!-- From bottom-right of central rect (380, 227) to top-left of bottom-right rect (522, 271) -->
  <line x1="380" y1="227" x2="522" y2="271"
        stroke="#f0883e" stroke-width="1.5"
        marker-end="url(#arrow-amber)"/>

  <!-- Edge: Central -> JWT library choice (gray, solid) -->
  <!-- From bottom edge of central rect (340, 227) to top edge of JWT rect (480, 306) -->
  <line x1="355" y1="227" x2="455" y2="306"
        stroke="#8b949e" stroke-width="1.5"
        marker-end="url(#arrow-gray)"/>

  <!-- Edge: Auth middleware bug -> Session invalidation fix (faint dashed) -->
  <!-- From right edge of auth rect (677, 105) to left edge of session rect (715, 105) -->
  <line x1="677" y1="105" x2="713" y2="105"
        stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"
        marker-end="url(#arrow-faint)"/>

  <!-- 3. NODE FILLS — drawn after edges so edges don't overdraw node interiors -->

  <!-- Query node circle -->
  <circle cx="85" cy="200" r="38" fill="#0d1a2e" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- Central match node: rounded rect centered at (340, 200), 170x54 -->
  <rect x="255" y="173" width="170" height="54" rx="8"
        fill="#0d2415" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Auth middleware bug: centered at (600, 105), 155x48 -->
  <rect x="522" y="81" width="155" height="48" rx="8"
        fill="#2a0d0d" stroke="#f85149" stroke-width="1.5"/>

  <!-- Token expiry pattern: centered at (610, 200), 155x48 -->
  <rect x="532" y="176" width="155" height="48" rx="8"
        fill="#0d2415" stroke="#3fb950" stroke-width="1.5"/>

  <!-- httpOnly cookie rule: centered at (600, 295), 155x48 -->
  <rect x="522" y="271" width="155" height="48" rx="8"
        fill="#2a1a0d" stroke="#f0883e" stroke-width="1.5"/>

  <!-- JWT library choice: centered at (480, 330), 155x48 -->
  <rect x="402" y="306" width="155" height="48" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Session invalidation fix (faint 2nd-hop): centered at (778, 105), 130x40 -->
  <rect x="713" y="85" width="130" height="40" rx="6"
        fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- 4. TEXT — drawn last, on top of all fills -->

  <!-- Title and subtitle -->
  <text x="30" y="30"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="600" fill="#e6edf3">
    Knowledge Graph: Pull in Context Automatically
  </text>
  <text x="30" y="50"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" fill="#8b949e">
    One query surfaces the whole context neighborhood -- decisions, bugs, and patterns that connect.
  </text>

  <!-- Query node label -->
  <text x="85" y="196"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="700" fill="#58a6ff"
        text-anchor="middle">QUERY</text>
  <text x="85" y="212"
        font-family="'Courier New', monospace"
        font-size="11" fill="#8b949e"
        text-anchor="middle">auth flow</text>

  <!-- Central match node labels -->
  <text x="340" y="196"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#e6edf3"
        text-anchor="middle">RS256 JWT Decision</text>
  <text x="340" y="213"
        font-family="'Courier New', monospace"
        font-size="11" fill="#8b949e"
        text-anchor="middle">decision  importance: high</text>

  <!-- Auth middleware bug labels -->
  <text x="599" y="101"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="500" fill="#e6edf3"
        text-anchor="middle">Auth middleware bug</text>
  <text x="599" y="118"
        font-family="'Courier New', monospace"
        font-size="11" fill="#f85149"
        text-anchor="middle">error</text>

  <!-- Token expiry pattern labels -->
  <text x="609" y="196"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="500" fill="#e6edf3"
        text-anchor="middle">Token expiry pattern</text>
  <text x="609" y="213"
        font-family="'Courier New', monospace"
        font-size="11" fill="#3fb950"
        text-anchor="middle">pattern</text>

  <!-- httpOnly cookie rule labels -->
  <text x="599" y="291"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="500" fill="#e6edf3"
        text-anchor="middle">httpOnly cookie rule</text>
  <text x="599" y="308"
        font-family="'Courier New', monospace"
        font-size="11" fill="#f0883e"
        text-anchor="middle">decision</text>

  <!-- JWT library choice labels -->
  <text x="479" y="326"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="500" fill="#8b949e"
        text-anchor="middle">JWT library choice</text>
  <text x="479" y="343"
        font-family="'Courier New', monospace"
        font-size="11" fill="#8b949e"
        text-anchor="middle">decision</text>

  <!-- Session invalidation fix labels (faint) -->
  <text x="778" y="102"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e"
        text-anchor="middle">Session invalidation</text>
  <text x="778" y="117"
        font-family="'Courier New', monospace"
        font-size="11" fill="#8b949e"
        text-anchor="middle">fix</text>

  <!-- Edge labels -->
  <!-- Query -> Central: "BM25 + vector match" — positioned along the edge midpoint -->
  <text x="188" y="193"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#58a6ff"
        text-anchor="middle">BM25 + vector match</text>

  <!-- Central -> Auth middleware bug: "causes" -->
  <text x="470" y="143"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#f85149"
        text-anchor="middle">causes</text>

  <!-- Central -> Token expiry: "relates_to" -->
  <text x="480" y="192"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#3fb950"
        text-anchor="middle">relates_to</text>

  <!-- Central -> httpOnly: "supports" -->
  <text x="467" y="264"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#f0883e"
        text-anchor="middle">supports</text>

  <!-- Central -> JWT library: "relates_to" -->
  <text x="398" y="278"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e"
        text-anchor="middle">relates_to</text>

  <!-- 2-hop edge label -->
  <text x="694" y="97"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#30363d"
        text-anchor="middle">2-hop</text>

  <!-- Legend — bottom strip -->
  <!-- Background strip for legend -->
  <rect x="30" y="370" width="560" height="22" rx="4" fill="#161b22"/>

  <!-- Legend item 1: Direct match (green dot) -->
  <circle cx="50" cy="381" r="5" fill="#3fb950"/>
  <text x="60" y="385"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e">Direct match</text>

  <!-- Legend item 2: 1-hop neighbor (amber dot) -->
  <circle cx="175" cy="381" r="5" fill="none" stroke="#f0883e" stroke-width="1.5"/>
  <text x="185" y="385"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e">1-hop neighbor</text>

  <!-- Legend item 3: 2-hop neighbor (gray dot, faint) -->
  <circle cx="310" cy="381" r="5" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="320" y="385"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#8b949e">2-hop neighbor</text>

</svg>
