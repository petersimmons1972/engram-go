  <line x1="650" y1="140" x2="650" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- Horizontal bus -->
  <line x1="165" y1="165" x2="1135" y2="165" stroke="#334155" stroke-width="1.5"/>

