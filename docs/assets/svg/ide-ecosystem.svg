<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <radialGradient id="ide-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ADD8" stop-opacity="0"/>
    </radialGradient>
    <marker id="ide-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#21262d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117"/>

  <!-- Grid -->
  <line x1="0" y1="140" x2="900" y2="140" stroke="#f0f6fc" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="280" x2="900" y2="280" stroke="#f0f6fc" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="420" stroke="#f0f6fc" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="420" stroke="#f0f6fc" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="420" stroke="#f0f6fc" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="2">IDE ECOSYSTEM</text>

  <!-- Hub glow -->
  <circle cx="450" cy="200" r="90" fill="url(#ide-hub-glow)"/>

  <!-- Spoke lines (orthogonal-ish, to each IDE box) -->
  <!-- Claude Code (top-left) -->
  <line x1="384" y1="167" x2="270" y2="112" stroke="#21262d" stroke-width="1.5"/>
  <!-- VS Code (top) -->
  <line x1="440" y1="158" x2="440" y2="95" stroke="#21262d" stroke-width="1.5"/>
  <!-- Cursor (top-right) -->
  <line x1="516" y1="167" x2="630" y2="112" stroke="#21262d" stroke-width="1.5"/>
  <!-- Windsurf (right) -->
  <line x1="520" y1="200" x2="660" y2="200" stroke="#21262d" stroke-width="1.5"/>
  <!-- Opencode (bottom-right) -->
  <line x1="516" y1="233" x2="630" y2="298" stroke="#21262d" stroke-width="1.5"/>
  <!-- Claude Desktop (bottom-left) -->
  <line x1="384" y1="233" x2="270" y2="298" stroke="#21262d" stroke-width="1.5"/>

  <!-- SSE/Bearer labels on spokes -->
  <rect x="290" y="118" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="337" y="129" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">SSE / Bearer</text>

  <rect x="400" y="100" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="447" y="111" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">SSE / Bearer</text>

  <rect x="520" y="118" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="567" y="129" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">SSE / Bearer</text>

  <rect x="565" y="191" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="612" y="202" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">SSE / Bearer</text>

  <rect x="520" y="260" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="567" y="271" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">SSE / Bearer</text>

  <rect x="285" y="260" width="95" height="15" rx="3" fill="#0d1117"/>
  <text x="332" y="271" font-family="'Courier New',monospace" font-size="9" fill="#8b949e" text-anchor="middle">stdio bridge</text>

  <!-- Center hub -->
  <rect x="374" y="158" width="152" height="84" rx="8" fill="#161b22" stroke="#00ADD8" stroke-width="2.5"/>
  <text x="450" y="182" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">engram-go</text>
  <text x="450" y="204" font-family="'Courier New',monospace" font-size="15" font-weight="700" fill="#00ADD8" text-anchor="middle">:8788</text>
  <text x="450" y="224" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">MCP SSE server</text>

  <!-- IDE boxes -->
  <!-- Claude Code -->
  <rect x="175" y="75" width="135" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="242" y="101" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Claude Code</text>

  <!-- VS Code -->
  <rect x="373" y="40" width="135" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="440" y="66" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">VS Code</text>

  <!-- Cursor -->
  <rect x="590" y="75" width="135" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="657" y="101" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Cursor</text>

  <!-- Windsurf -->
  <rect x="660" y="178" width="135" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="727" y="204" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Windsurf</text>

  <!-- Opencode -->
  <rect x="590" y="285" width="135" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="657" y="311" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Opencode</text>

  <!-- Claude Desktop -->
  <rect x="155" y="285" width="155" height="44" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="232" y="304" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Claude</text>
  <text x="232" y="322" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">Desktop</text>

  <!-- Bottom label -->
  <text x="450" y="375" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">35 tools available  ·  30 base tools + 5 AI-enhanced tools (require ANTHROPIC_API_KEY)</text>
</svg>
