<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="cr-bar-muted" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b949e"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="cr-bar-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#0d7fa0"/>
    </linearGradient>
    <linearGradient id="cr-bar-cyan-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#4fcfed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117"/>

  <!-- Grid lines (vertical chart grid) -->
  <line x1="220" y1="60" x2="220" y2="330" stroke="#f0f6fc" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="360" y1="60" x2="360" y2="330" stroke="#f0f6fc" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="500" y1="60" x2="500" y2="330" stroke="#f0f6fc" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="640" y1="60" x2="640" y2="330" stroke="#f0f6fc" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="780" y1="60" x2="780" y2="330" stroke="#f0f6fc" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Baseline -->
  <line x1="220" y1="330" x2="820" y2="330" stroke="#21262d" stroke-width="1.5"/>
  <!-- Y axis -->
  <line x1="220" y1="60" x2="220" y2="330" stroke="#21262d" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="32" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="16" font-weight="700" fill="#f0f6fc" text-anchor="middle">Context-efficient recall.</text>
  <text x="450" y="52" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="1">CONTEXT TOKENS PER 10 RECALLS</text>

  <!-- Y-axis label -->
  <text x="40" y="210" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" transform="rotate(-90,40,210)">Context tokens</text>

  <!-- Y-axis tick labels -->
  <text x="210" y="334" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="end">0</text>
  <text x="210" y="264" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="end">25k</text>
  <text x="210" y="194" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="end">50k</text>
  <text x="210" y="124" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="end">75k</text>
  <text x="210" y="64" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="end">100k</text>

  <!-- Bar 1: Full text (longest, muted) — width ~550 representing ~100k tokens -->
  <rect x="220" y="90" width="550" height="60" rx="4" fill="url(#cr-bar-muted)"/>
  <text x="240" y="126" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Full text (detail=full)</text>
  <text x="780" y="126" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" fill="#f0f6fc" text-anchor="start">  ~100k tokens</text>

  <!-- Bar 2: Handle mode (short, Go cyan) — width ~42 representing ~7.5k tokens -->
  <rect x="220" y="175" width="42" height="60" rx="4" fill="url(#cr-bar-cyan)"/>
  <text x="272" y="211" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Handle mode (default)</text>
  <text x="780" y="211" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" fill="#00ADD8" text-anchor="start">  ~1k refs</text>

  <!-- Bar 3: Summary mode (medium, lighter cyan) — width ~125 representing ~7.5k tokens -->
  <rect x="220" y="260" width="125" height="60" rx="4" fill="url(#cr-bar-cyan-light)"/>
  <text x="356" y="296" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Summary mode (detail=summary)</text>
  <text x="780" y="296" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" fill="#4fcfed" text-anchor="start">  ~7.5k tokens</text>

  <!-- Reduction callout -->
  <rect x="600" y="140" width="170" height="60" rx="8" fill="#161b22" stroke="#00ADD8" stroke-width="1.5"/>
  <text x="685" y="163" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Handle vs Full</text>
  <text x="685" y="185" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="18" font-weight="700" fill="#00ADD8" text-anchor="middle">~100× reduction</text>

  <!-- Footnote -->
  <text x="450" y="390" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Handle mode returns lightweight references — fetch full content only for the 2–3 memories you actually need.</text>
</svg>
