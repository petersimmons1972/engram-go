apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
rules:
- apiGroups: [ai.petersimmons.com]
  resources: [gpuhosts]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
subjects:
- kind: ServiceAccount
  name: ai-fleet-controller
  namespace: ai-fleet
roleRef:
  kind: Role
  name: ai-fleet-controller
  apiGroup: rbac.authorization.k8s.io
