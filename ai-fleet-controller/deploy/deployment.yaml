apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-fleet-controller
  template:
    metadata:
      labels:
        app: ai-fleet-controller
    spec:
      serviceAccountName: ai-fleet-controller
      containers:
      - name: controller
        image: registry.petersimmons.com/ai-fleet/controller:latest
        ports:
        - containerPort: 8080
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
spec:
  selector:
    app: ai-fleet-controller
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-fleet-controller
  namespace: ai-fleet
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: ai-fleet.petersimmons.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-fleet-controller
            port:
              number: 80
  tls:
  - hosts:
    - ai-fleet.petersimmons.com
    secretName: ai-fleet-controller-tls
