---
apiVersion: v1
kind: ConfigMap
metadata:
  name: olla-config
  namespace: ai-fleet
data:
  config.local.yaml: |
    server:
      host: "0.0.0.0"
      port: 40114
      request_logging: true
      rate_limits:
        global_requests_per_minute: 60000
        per_ip_requests_per_minute: 60000
        burst_size: 50000

    proxy:
      engine: "olla"
      load_balancer: "priority"
      profile: "auto"
      connection_timeout: 60s
      response_timeout: 900s
      read_timeout: 600s
      retry:
        enabled: true
        on_connection_failure: true
        on_status_codes: [502, 503, 504]
        max_attempts: 2
      # Circuit breaker timeout raised for cold-start tolerance.
      # oblivion-gb10-vllm (Qwen3-32B) takes ~1800s to load from NFS;
      # the default 30s cooldown caused perpetual lock-out during cold-start
      # (3 x 150s client timeouts -> breaker open -> 30s half-open probe -> repeat).
      # 2000s > NFS load time; breaker self-heals once vLLM is warm.
      # Per-endpoint override (aifleet#95) will replace this global when implemented.
      # See: petersimmons1972/aifleet#94, #95.
      circuit_breaker:
        timeout: 2000s
        threshold: 5

    discovery:
      type: "static"
      refresh_interval: 30s
      static:
        endpoints:
          # GB10 Grace-Blackwell (128 GB unified) -- Qwen3-32B BF16
          # Managed by ai-fleet-controller (policy 49658164)
          # Inference only -- NOT an embedder. No embeddings capability.
          # circuit_breaker_timeout: 2000s set to match NFS model load time (~1800s).
          - url: "http://oblivion.petersimmons.com:8000"
            name: "oblivion-gb10-vllm"
            type: "openai-compatible"
            priority: 200
            circuit_breaker_timeout: 2000s
            circuit_breaker_threshold: 10

          # MI-50 / Radeon VII (16 GB, gfx906, precision) -- BAAI/bge-m3 via llama.cpp port 8007
          # PRIMARY embed endpoint. Confirmed HEALTHY (advertises BAAI/bge-m3, 1024-dim).
          # Highest priority embed endpoint -- priority-LB routes all embed traffic here first.
          - url: "http://precision.petersimmons.com:8007"
            name: "ai-fleet-embed-mi50"
            type: "openai-compatible"
            priority: 200
            capabilities: ["embeddings"]

          # W6800 (32 GB, gfx1030, precision) -- bge-m3-Q8_0.gguf via llama.cpp port 8005
          # Secondary embed endpoint.
          - url: "http://precision.petersimmons.com:8005"
            name: "precision-w6800-llamacpp"
            type: "openai-compatible"
            priority: 100
            capabilities: ["embeddings"]

          # RX 7900 XT (20 GB, gfx1100, leviathan) -- bge-m3-Q8_0.gguf via llama.cpp port 8004
          # Backup embed endpoint. CURRENTLY OFFLINE. Retained as low-priority backup;
          # priority-LB will not route here while it is down.
          - url: "http://leviathan.petersimmons.com:8004"
            name: "embed-7900xt"
            type: "openai-compatible"
            priority: 25
            capabilities: ["embeddings"]

      model_discovery:
        enabled: true
        interval: 5m
        timeout: 30s

    model_registry:
      type: "memory"
      enable_unifier: true
      unification:
        enabled: true
        stale_threshold: 24h
        cleanup_interval: 10m
      routing_strategy:
        type: "discovery"
        options:
          fallback_behavior: "compatible_only"
          discovery_timeout: 2s
          discovery_refresh_on_miss: true

    translators:
      anthropic:
        enabled: true
        passthrough_enabled: true

    logging:
      level: "info"
      format: "json"
      output: "stdout"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: olla
  namespace: ai-fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: olla
  template:
    metadata:
      labels:
        app: olla
    spec:
      containers:
      - name: olla
        image: ghcr.io/thushan/olla:latest
        ports:
        - containerPort: 40114
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /olla/health
            port: 40114
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /olla/health
            port: 40114
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: olla-config
---
apiVersion: v1
kind: Service
metadata:
  name: olla
  namespace: ai-fleet
spec:
  selector:
    app: olla
  ports:
  - port: 80
    targetPort: 40114
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: olla
  namespace: ai-fleet
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: olla.petersimmons.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: olla
            port:
              number: 80
  tls:
  - hosts:
    - olla.petersimmons.com
    secretName: olla-tls
