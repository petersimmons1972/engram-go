# engram — Docker Compose (v2.0, Go) — Hybrid Profile (LiteLLM)
#
# Services:
#   postgres        — persistent storage
#   engram-go       — MCP server (port 8788) — NO direct LiteLLM calls at recall time
#   engram-reembed  — background embedding worker — the ONLY service that calls LiteLLM heavily
#
# This profile assumes you have a LiteLLM proxy running externally (another host or compose stack).
# For local-only (Ollama-in-Docker), use: docker compose -f docker-compose.local.yml up -d
#
# Firewall design: engram-go uses LiteLLM only for query embedding (2s timeout +
# BM25 fallback). The reembed worker runs in its own container with its own
# LiteLLM concurrency budget, so bulk re-embedding never starves MCP recall.
#
# LiteLLM endpoint: Must be set in .env as LITELLM_URL (e.g., http://your-host:4000)
# The Docker bridge IP (172.17.0.x) is whitelisted for /setup-token automatically.
#
# WARNING: NEVER run 'docker compose down -v' — the -v flag destroys Docker
# volumes and permanently deletes all memory data. Use 'make down-safe' or
# 'docker compose down' (no -v) to stop containers while preserving data.

services:

  postgres:
    container_name: engram-postgres
    image: engram-postgres-cg:latest
    shm_size: '2gb'
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >-
      -c max_connections=300
      -c shared_buffers=${PG_SHARED_BUFFERS:-12GB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-48GB}
      -c work_mem=32MB
      -c maintenance_work_mem=512MB
      -c wal_buffers=64MB
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_worker_processes=16
      -c checkpoint_completion_target=0.9
      -c random_page_cost=2.0
      -c effective_io_concurrency=32
    environment:
      # These variables are required and must be set via .env or shell environment
      - POSTGRES_USER=engram
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=engram
      # ENGRAM_SETUP_TOKEN_ALLOW_RFC1918=1 is set in the engram-go service below
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram && psql -U engram -d engram -c 'SELECT 1' -q --no-psqlrc 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  engram-go:
    container_name: engram-go-app
    image: engram-go:latest
    ports:
      - "${ENGRAM_PORT:-8788}:8788"
    env_file:
      - path: .env
        required: false
      - path: .env.machine-identity
        required: true
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      # OpenAI-compatible upstream (olla load balancer; LiteLLM container retired 2026-05-05)
      - LITELLM_URL=${LITELLM_URL:-http://olla:40114/olla/openai}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # Embedding service — same olla endpoint by default
      - ENGRAM_EMBED_URL=${ENGRAM_EMBED_URL:-http://olla:40114/olla/openai}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-diqiuzhuanzhuan/jina-embeddings-v4-text-retrieval-Q8_0.gguf:latest}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_SUMMARIZE_MODEL=${ENGRAM_SUMMARIZE_MODEL:-llama3.2:3b}
      # IMPORTANT: MCP server does NOT run the reembed worker — that lives in the
      # engram-reembed container. Setting batch_size=0 disables it in this container.
      - ENGRAM_REEMBED_BATCH_SIZE=0
      - ENGRAM_BASE_URL=http://127.0.0.1:${ENGRAM_PORT:-8788}
      # Optional: Claude API key enables memory_ask, memory_reason, etc.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENGRAM_CLAUDE_SUMMARIZE=${ENGRAM_CLAUDE_SUMMARIZE:-false}
      - ENGRAM_CLAUDE_CONSOLIDATE=${ENGRAM_CLAUDE_CONSOLIDATE:-false}
      - ENGRAM_CLAUDE_RERANK=${ENGRAM_CLAUDE_RERANK:-false}
      - ENGRAM_DATA_DIR=/data
      # Allow /setup-token from Docker bridge (RFC1918). In Docker, this is always needed.
      - ENGRAM_SETUP_TOKEN_ALLOW_RFC1918=1
    volumes:
      - engram-data:/data
    networks:
      - default
      - litellm
      - ai-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/starter", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  engram-reembed:
    container_name: engram-reembed
    build:
      context: .
      dockerfile: Dockerfile.reembed
    image: engram-reembed:latest
    # Rust binary — the ONLY container that sends high-throughput embedding
    # requests to LiteLLM. Isolated so bulk re-embedding never starves MCP recall.
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      - LITELLM_URL=${ENGRAM_EMBED_URL:-http://olla:40114/olla/openai}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-diqiuzhuanzhuan/jina-embeddings-v4-text-retrieval-Q8_0.gguf:latest}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_REEMBED_BATCH_SIZE=${ENGRAM_REEMBED_BATCH_SIZE:-100}
      - ENGRAM_REEMBED_INTERVAL=${ENGRAM_REEMBED_INTERVAL:-10s}
      - ENGRAM_REEMBED_CONCURRENCY=${ENGRAM_REEMBED_CONCURRENCY:-8}
      - ENGRAM_REEMBED_CONCURRENCY_MIN=${ENGRAM_REEMBED_CONCURRENCY_MIN:-1}
      - ENGRAM_REEMBED_CONCURRENCY_MAX=${ENGRAM_REEMBED_CONCURRENCY_MAX:-16}
      - ENGRAM_REEMBED_LATENCY_HIGH_MS=${ENGRAM_REEMBED_LATENCY_HIGH_MS:-2000}
      - ENGRAM_REEMBED_LATENCY_LOW_MS=${ENGRAM_REEMBED_LATENCY_LOW_MS:-400}
      - ENGRAM_REEMBED_RAMP_AFTER=${ENGRAM_REEMBED_RAMP_AFTER:-3}
    networks:
      - default
      - litellm
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true

  # ── Test database (CI only) ───────────────────────────────────────────────
  test-postgres:
    container_name: engram-test-postgres
    image: pgvector/pgvector:pg16
    profiles: ["test"]
    environment:
      - POSTGRES_DB=engram_test
      - POSTGRES_USER=engram
      - POSTGRES_PASSWORD=test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "engram"]
      interval: 3s
      timeout: 2s
      retries: 5

volumes:
  pgdata:
    external: true
    name: engram_pgdata            # claims existing data — all memories preserved
  engram-data:

networks:
  default: {}
  litellm:
    external: true
    name: litellm_default          # shared with the LiteLLM proxy container
  ai-network:
    external: true
    name: ai-network               # shared with olla load balancer
