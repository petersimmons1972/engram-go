# engram — Docker Compose (v2.0, Go) — Hybrid Profile (olla router)
#
# Services:
#   postgres                — persistent storage
#   engram-go               — MCP server (port 8788) — NO direct embed calls at recall time
#   engram-reembed-7900xt   — reembed worker → leviathan RX 7900 XT (REEMBED_7900XT_URL)
#   engram-reembed-w6800    — reembed worker → precision W6800 (REEMBED_W6800_URL)
#   engram-reembed-oblivion — reembed worker → oblivion GB10 (REEMBED_OBLIVION_URL)
#
# One reembed container per GPU endpoint. Tune each independently via .env:
#   REEMBED_<GPU>_URL, REEMBED_<GPU>_CONCURRENCY_MAX, REEMBED_<GPU>_TOKIO_THREADS
#
# This profile assumes you have an olla load balancer running externally (or LiteLLM proxy).
# The LiteLLM proxy container was retired 2026-05-05; olla now handles all embed routing.
# For local-only (Ollama-in-Docker), use: docker compose -f docker-compose.local.yml up -d
#
# Firewall design: engram-go uses the embed router only for query embedding (2s timeout +
# BM25 fallback). Reembed workers run in isolated containers with their own
# concurrency budgets so bulk re-embedding never starves MCP recall.
#
# Router endpoint: LITELLM_URL in .env (legacy name; points to olla, not LiteLLM).
# Rename to ENGRAM_ROUTER_URL tracked in issue #634.
# The Docker bridge IP (172.17.0.x) is whitelisted for /setup-token automatically.
#
# WARNING: NEVER run 'docker compose down -v' — the -v flag destroys Docker
# volumes and permanently deletes all memory data. Use 'make down-safe' or
# 'docker compose down' (no -v) to stop containers while preserving data.

# Shared reembed config — overridden per-GPU below
x-reembed-base: &reembed-base
  image: engram-reembed:latest
  build:
    context: .
    dockerfile: Dockerfile.reembed
  networks:
    - default
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped
  mem_limit: 256m
  security_opt:
    - no-new-privileges:true

services:

  postgres:
    container_name: engram-postgres
    image: engram-postgres-cg:latest
    shm_size: '16gb'
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >-
      -c max_connections=300
      -c shared_buffers=${PG_SHARED_BUFFERS:-24GB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-72GB}
      -c work_mem=128MB
      -c maintenance_work_mem=2GB
      -c wal_buffers=256MB
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_worker_processes=16
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c max_wal_size=4GB
      -c random_page_cost=2.0
      -c effective_io_concurrency=32
      -c synchronous_commit=off
    environment:
      # These variables are required and must be set via .env or shell environment
      - POSTGRES_USER=engram
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=engram
      # ENGRAM_SETUP_TOKEN_ALLOW_RFC1918=1 is set in the engram-go service below
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram && psql -U engram -d engram -c 'SELECT 1' -q --no-psqlrc 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  engram-go:
    container_name: engram-go-app
    image: engram-go:latest
    ports:
      - "${ENGRAM_PORT:-8788}:8788"
    env_file:
      - path: .env
        required: false
      - path: .env.machine-identity
        required: true
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      # OpenAI-compatible upstream (olla load balancer; LiteLLM container retired 2026-05-05)
      - LITELLM_URL=${LITELLM_URL:-http://olla:40114/olla/openai}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # Embedding service — Infinity/bge-m3 on oblivion (2026-05-08: switched from vLLM/jina-v5, 14x throughput)
      - ENGRAM_EMBED_URL=${ENGRAM_EMBED_URL:-http://oblivion.petersimmons.com:8003}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-BAAI/bge-m3}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_SUMMARIZE_MODEL=${ENGRAM_SUMMARIZE_MODEL:-llama3.2:3b}
      # IMPORTANT: MCP server does NOT run the reembed worker — that lives in the
      # engram-reembed container. Setting batch_size=0 disables it in this container.
      - ENGRAM_REEMBED_BATCH_SIZE=0
      - ENGRAM_BASE_URL=http://127.0.0.1:${ENGRAM_PORT:-8788}
      # Optional: Claude API key enables memory_ask, memory_reason, etc.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENGRAM_CLAUDE_SUMMARIZE=${ENGRAM_CLAUDE_SUMMARIZE:-false}
      - ENGRAM_CLAUDE_CONSOLIDATE=${ENGRAM_CLAUDE_CONSOLIDATE:-false}
      - ENGRAM_CLAUDE_RERANK=${ENGRAM_CLAUDE_RERANK:-false}
      - ENGRAM_DATA_DIR=/data
      # Allow /setup-token from Docker bridge (RFC1918). In Docker, this is always needed.
      - ENGRAM_SETUP_TOKEN_ALLOW_RFC1918=1
    volumes:
      - engram-data:/data
    networks:
      - default
      - litellm
      - ai-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 4gb
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/starter", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Reembed workers — one per GPU endpoint ───────────────────────────────
  # Adaptive concurrency: each worker self-tunes between CONCURRENCY_MIN and
  # CONCURRENCY_MAX using latency feedback. Set MAX high; the controller finds
  # the right level automatically. Tune thresholds per-GPU in .env if needed.

  engram-reembed-7900xt:
    <<: *reembed-base
    container_name: engram-reembed-7900xt
    # RX 7900 XT on leviathan — 896 GB/s, ~15,600 chunks/min
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      - LITELLM_URL=${REEMBED_7900XT_URL:-http://172.23.0.1:8004}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-BAAI/bge-m3}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_EMBED_SUB_BATCH=${ENGRAM_EMBED_SUB_BATCH:-100}
      - ENGRAM_REEMBED_BATCH_SIZE=${ENGRAM_REEMBED_BATCH_SIZE:-2000}
      - ENGRAM_REEMBED_INTERVAL=${ENGRAM_REEMBED_INTERVAL:-10ms}
      - ENGRAM_REEMBED_CONCURRENCY_MIN=${REEMBED_7900XT_CONCURRENCY_MIN:-1}
      - ENGRAM_REEMBED_CONCURRENCY_MAX=${REEMBED_7900XT_CONCURRENCY_MAX:-20}
      - ENGRAM_REEMBED_LATENCY_HIGH_MS=${REEMBED_7900XT_LATENCY_HIGH_MS:-2000}
      - ENGRAM_REEMBED_LATENCY_LOW_MS=${REEMBED_7900XT_LATENCY_LOW_MS:-400}
      - ENGRAM_REEMBED_RAMP_AFTER=${ENGRAM_REEMBED_RAMP_AFTER:-3}
      - TOKIO_WORKER_THREADS=${REEMBED_7900XT_TOKIO_THREADS:-20}

  engram-reembed-w6800:
    <<: *reembed-base
    container_name: engram-reembed-w6800
    # W6800 on precision — GPU 0, ~32 GB VRAM
    # Use REEMBED_W6800_SUB_BATCH to override global ENGRAM_EMBED_SUB_BATCH.
    # Default 32 (not 100) — W6800 OOMs with sub_batch=100 at concurrency≥4.
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      - LITELLM_URL=${REEMBED_W6800_URL:-http://precision.petersimmons.com:8005}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-BAAI/bge-m3}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_EMBED_SUB_BATCH=${REEMBED_W6800_SUB_BATCH:-32}
      - ENGRAM_REEMBED_BATCH_SIZE=${ENGRAM_REEMBED_BATCH_SIZE:-2000}
      - ENGRAM_REEMBED_INTERVAL=${ENGRAM_REEMBED_INTERVAL:-10ms}
      - ENGRAM_REEMBED_CONCURRENCY_MIN=${REEMBED_W6800_CONCURRENCY_MIN:-1}
      - ENGRAM_REEMBED_CONCURRENCY_MAX=${REEMBED_W6800_CONCURRENCY_MAX:-20}
      - ENGRAM_REEMBED_LATENCY_HIGH_MS=${REEMBED_W6800_LATENCY_HIGH_MS:-2000}
      - ENGRAM_REEMBED_LATENCY_LOW_MS=${REEMBED_W6800_LATENCY_LOW_MS:-400}
      - ENGRAM_REEMBED_RAMP_AFTER=${ENGRAM_REEMBED_RAMP_AFTER:-3}
      - TOKIO_WORKER_THREADS=${REEMBED_W6800_TOKIO_THREADS:-20}

  engram-reembed-oblivion:
    <<: *reembed-base
    container_name: engram-reembed-oblivion
    # GB10 Grace-Blackwell on oblivion — 273 GB/s unified, ~2,200 chunks/min
    # Lower MAX vs 7900xt — bandwidth-limited despite TFLOPS advantage
    environment:
      - DATABASE_URL=postgresql://engram:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/engram?sslmode=disable
      - LITELLM_URL=${REEMBED_OBLIVION_URL:-http://oblivion.petersimmons.com:8003}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - ENGRAM_EMBED_MODEL=${ENGRAM_EMBED_MODEL:-BAAI/bge-m3}
      - ENGRAM_EMBED_DIMENSIONS=${ENGRAM_EMBED_DIMENSIONS:-1024}
      - ENGRAM_EMBED_SUB_BATCH=${ENGRAM_EMBED_SUB_BATCH:-100}
      - ENGRAM_REEMBED_BATCH_SIZE=${ENGRAM_REEMBED_BATCH_SIZE:-2000}
      - ENGRAM_REEMBED_INTERVAL=${ENGRAM_REEMBED_INTERVAL:-10ms}
      - ENGRAM_REEMBED_CONCURRENCY_MIN=${REEMBED_OBLIVION_CONCURRENCY_MIN:-1}
      - ENGRAM_REEMBED_CONCURRENCY_MAX=${REEMBED_OBLIVION_CONCURRENCY_MAX:-8}
      - ENGRAM_REEMBED_LATENCY_HIGH_MS=${REEMBED_OBLIVION_LATENCY_HIGH_MS:-5000}
      - ENGRAM_REEMBED_LATENCY_LOW_MS=${REEMBED_OBLIVION_LATENCY_LOW_MS:-2000}
      - ENGRAM_REEMBED_RAMP_AFTER=${ENGRAM_REEMBED_RAMP_AFTER:-3}
      - TOKIO_WORKER_THREADS=${REEMBED_OBLIVION_TOKIO_THREADS:-8}

  # ── Test database (CI only) ───────────────────────────────────────────────
  test-postgres:
    container_name: engram-test-postgres
    image: pgvector/pgvector:pg16
    profiles: ["test"]
    environment:
      - POSTGRES_DB=engram_test
      - POSTGRES_USER=engram
      - POSTGRES_PASSWORD=test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "engram"]
      interval: 3s
      timeout: 2s
      retries: 5

volumes:
  pgdata:
    external: true
    name: engram_pgdata            # claims existing data — all memories preserved
  engram-data:

networks:
  default: {}
  litellm:
    external: true
    name: litellm_default          # shared with the LiteLLM proxy container
  ai-network:
    external: true
    name: ai-network               # shared with olla load balancer
