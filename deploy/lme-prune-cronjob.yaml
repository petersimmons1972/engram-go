# lme-prune-cronjob.yaml — weekly sweep of expired lme-* scratch projects (#754)
#
# Runs `longmemeval prune` every Sunday at 02:00 UTC.
# Requires:
#   - Secret "engram-lme" with keys: database-url, engram-url, engram-api-key
#   - RBAC: no cluster permissions needed (contacts Postgres + Engram HTTP only)
#   - Image: ghcr.io/petersimmons1972/engram-go/longmemeval@sha256:c51f11f15003768b965774669b753c885c40cfdf13e2bb8b7a42f652143161f3
#
# Never use :latest for this CronJob. This job runs a destructive `prune --execute`
# path on a schedule, so image changes must be explicit and reviewable. To update it,
# replace the pinned tag with the reviewed release tag or immutable digest, then
# update both this comment and the image reference in the same reviewed change.
#
# Tune --limit on first run to verify blast radius before allowing unlimited.
# Deletion is explicit: --execute, --confirm-prefix, and --use-default-token are
# all required because prune defaults to plan-only mode.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lme-prune
  namespace: engram
  labels:
    app.kubernetes.io/name: lme-prune
    app.kubernetes.io/component: maintenance
    app.kubernetes.io/part-of: engram
spec:
  schedule: "0 2 * * 0"  # Every Sunday at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600  # 10 minutes max; prune is not long-running
      template:
        metadata:
          labels:
            app.kubernetes.io/name: lme-prune
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            fsGroup: 65532
          containers:
            - name: lme-prune
              # Run engram directly for deterministic subcommand execution.
              # This avoids starter's subcommand allowlist and makes the
              # execution contract explicit in this manifest.
              command: ["/engram"]
              image: ghcr.io/petersimmons1972/engram-go/longmemeval@sha256:c51f11f15003768b965774669b753c885c40cfdf13e2bb8b7a42f652143161f3
              imagePullPolicy: Always
              args:
                - prune
                - --prefix=lme-
                - --execute
                - --confirm-prefix=lme-
                - --limit=200       # cap per-run; remove once first run is verified
                - --use-default-token
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: engram-lme
                      key: database-url
                - name: ENGRAM_URL
                  valueFrom:
                    secretKeyRef:
                      name: engram-lme
                      key: engram-url
                - name: ENGRAM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: engram-lme
                      key: engram-api-key
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
