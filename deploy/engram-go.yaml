apiVersion: apps/v1
kind: Deployment
metadata:
  name: engram-go
  namespace: engram
  labels:
    app: engram-go
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: engram-go
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-06-19T08:45:20-04:00"
      labels:
        app: engram-go
    spec:
      containers:
        - name: engram-go
          image: registry.petersimmons.com/engram/engram-go:main-06a80f1-20260715050743@sha256:0b649d7a1440c7aef566a6b813d9facc1f9be54618f815a42004b20fe6866bf3
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: engram-app-secret
                  key: DATABASE_URL
            - name: ENGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: engram-app-secret
                  key: ENGRAM_API_KEY
            - name: ENGRAM_ROUTER_URL
              valueFrom:
                secretKeyRef:
                  name: engram-app-secret
                  key: ENGRAM_ROUTER_URL
            - name: ENGRAM_EMBED_URL
              value: http://olla.ai-fleet.svc.cluster.local:80/olla/openai
            - name: ENGRAM_EMBED_MODEL
              valueFrom:
                configMapKeyRef:
                  name: engram-embed-model
                  key: ENGRAM_EMBED_MODEL
            - name: ENGRAM_EMBED_DIMENSIONS
              value: "1024"
            - name: ENGRAM_HOST
              value: 0.0.0.0
            - name: ENGRAM_BASE_URL
              value: https://engram.petersimmons.com
            - name: ENGRAM_SUMMARIZE_MODEL
              value: qwen3-14b-awq
            - name: ENGRAM_SUMMARIZE_ENABLED
              value: "false"
            - name: ENGRAM_REEMBED_BATCH_SIZE
              value: "0"
            - name: ENGRAM_SESSION_DIVERSITY_N
              value: "0"
            - name: ENGRAM_PREWARM_PROJECTS
              value: "0"
            - name: ENGRAM_RATE_LIMIT_RPS
              value: "500"
            - name: ENGRAM_RATE_LIMIT_BURST
              value: "2000"
            - name: ENGRAM_EMBED_RECALL_TIMEOUT_MS
              value: "1500"
          ports:
            - containerPort: 8788
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8788
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: 8788
              scheme: HTTP
            failureThreshold: 12
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8788
              scheme: HTTP
            failureThreshold: 30
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      terminationGracePeriodSeconds: 30
