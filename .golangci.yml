version: "2"

linters:
  enable:
    - errcheck      # all errors must be handled
    - govet         # standard go vet checks
    - staticcheck   # comprehensive static analysis (subsumes gosimple, unused)
    - revive        # idiomatic Go style
    - ineffassign   # detect unused assignments
    - misspell      # spelling errors in comments and strings
    - bodyclose     # HTTP response bodies must be closed
    - whitespace    # extra blank lines before/after blocks
    - godot         # exported comments end with a period
    - unconvert     # unnecessary type conversions
    - noctx         # HTTP requests must use context

  settings:
    revive:
      rules:
        # exported: disabled — PostgresBackend and other types implement internal
        # interfaces; stutter renames (ChunkHash, WeightHistory, etc.) are deferred.
        - name: exported
          disabled: true
        - name: var-naming
          severity: warning
        - name: error-return
          severity: warning
    errcheck:
      check-type-assertions: true
      check-blank: false  # allow _ = err in deferred patterns

  exclusions:
    rules:
      # Test files: relax errcheck, godot, noctx — test HTTP handlers routinely
      # ignore w.Write / json.Encoder.Encode / json.Decoder.Decode return values.
      - path: "_test\\.go$"
        linters:
          - errcheck
          - godot
          - noctx
      # Migration SQL files embedded in Go — skip all linters.
      - path: "internal/db/migrations"
        linters:
          - all
      # staticcheck QF1012 in test fixture — fine to leave as-is.
      - path: "ingest_document_test\\.go$"
        linters:
          - staticcheck
