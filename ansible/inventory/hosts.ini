# K8s worker inventory for homelab-config playbooks.
#
# ansible_host=<IP> is set explicitly per node so that this playbook — which
# fixes node-level DNS for the internal container registry — remains runnable
# when DNS resolution is broken (which is the exact failure mode this playbook
# addresses). See issue #50.

[k8s_workers]
worker131.petersimmons.com ansible_host=192.168.0.131
worker132.petersimmons.com ansible_host=192.168.0.132
worker133.petersimmons.com ansible_host=192.168.0.133
worker134.petersimmons.com ansible_host=192.168.0.134
worker135.petersimmons.com ansible_host=192.168.0.135
worker136.petersimmons.com ansible_host=192.168.0.136
worker137.petersimmons.com ansible_host=192.168.0.137
worker138.petersimmons.com ansible_host=192.168.0.138
worker139.petersimmons.com ansible_host=192.168.0.139

[k8s_workers:vars]
# ansible_user is checked in deliberately: the local account on every worker
# node is `psimmons` and rotation would require both inventory update and
# /etc/passwd update on all nine nodes. If the user changes, edit here and
# coordinate the node-side rename in the same PR. See issue #51.
ansible_user=psimmons
