<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background-color: #0F172A;">
  <defs>
    <!-- Gradient for header -->
    <linearGradient id="day001-header-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8956A;stop-opacity:1" />
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="day001-card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#D4A574">
    Voice Is Structure: MUSIC vs ARCHITECTURE
  </text>

  <!-- Subtitle -->
  <text x="600" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#94A3B8">
    Quantifiable differences between Pyle and Murrow writing patterns
  </text>

  <!-- PYLE CARD (LEFT) -->
  <g filter="url(#day001-card-shadow)">
    <rect x="50" y="120" width="520" height="620" rx="12" fill="#1E293B" stroke="#D4A574" stroke-width="2"/>

    <!-- Card Header -->
    <rect x="50" y="120" width="520" height="60" rx="12" fill="url(#day001-header-gradient)"/>
    <text x="310" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#0F172A">
      ERNIE PYLE — MUSIC
    </text>

    <!-- Score -->
    <circle cx="310" cy="225" r="45" fill="#334155" stroke="#D4A574" stroke-width="3"/>
    <text x="310" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#D4A574">91</text>
    <text x="310" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#94A3B8">/100</text>

    <!-- Metrics -->
    <text x="80" y="305" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f8fafc">Structural Markers:</text>

    <!-- One-sentence paragraphs -->
    <text x="80" y="340" font-family="Georgia, serif" font-size="14" fill="#D4A574">One-sentence paragraphs:</text>
    <rect x="80" y="350" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="80" y="350" width="140" height="24" rx="4" fill="#D4A574"/>
    <text x="290" y="368" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">20-30%</text>

    <!-- Sentence length -->
    <text x="80" y="405" font-family="Georgia, serif" font-size="14" fill="#D4A574">Average sentence length:</text>
    <rect x="80" y="415" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="80" y="415" width="108" height="24" rx="4" fill="#D4A574"/>
    <text x="290" y="433" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">13 words</text>

    <!-- Pronoun "you" -->
    <text x="80" y="470" font-family="Georgia, serif" font-size="14" fill="#D4A574">Pronoun "you" density:</text>
    <rect x="80" y="480" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="80" y="480" width="160" height="24" rx="4" fill="#D4A574"/>
    <text x="290" y="498" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">3-5 per 100</text>

    <!-- Reading level -->
    <text x="80" y="535" font-family="Georgia, serif" font-size="14" fill="#D4A574">Reading level:</text>
    <rect x="80" y="545" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="80" y="545" width="120" height="24" rx="4" fill="#D4A574"/>
    <text x="290" y="563" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">Grade 8-9</text>

    <!-- Voice Pattern -->
    <text x="80" y="600" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f8fafc">Voice Pattern:</text>
    <text x="80" y="625" font-family="Georgia, serif" font-size="14" fill="#94A3B8" style="font-style: italic;">
      <tspan x="80" dy="0">"I'm watching WITH you"</tspan>
      <tspan x="80" dy="20">Rhythmic variety for emotional</tspan>
      <tspan x="80" dy="20">immediacy. Ground-level witness.</tspan>
    </text>

    <!-- Best Use -->
    <text x="80" y="700" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#D4A574">Best for:</text>
    <text x="80" y="720" font-family="Georgia, serif" font-size="13" fill="#94A3B8">Immersive accounts, human stories</text>
  </g>

  <!-- MURROW CARD (RIGHT) -->
  <g filter="url(#day001-card-shadow)">
    <rect x="630" y="120" width="520" height="620" rx="12" fill="#1E293B" stroke="#D4A574" stroke-width="2"/>

    <!-- Card Header -->
    <rect x="630" y="120" width="520" height="60" rx="12" fill="url(#day001-header-gradient)"/>
    <text x="890" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#0F172A">
      EDWARD R. MURROW — ARCHITECTURE
    </text>

    <!-- Score -->
    <circle cx="890" cy="225" r="45" fill="#334155" stroke="#D4A574" stroke-width="3"/>
    <text x="890" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#D4A574">88</text>
    <text x="890" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#94A3B8">/100</text>

    <!-- Metrics -->
    <text x="660" y="305" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f8fafc">Structural Markers:</text>

    <!-- One-sentence paragraphs -->
    <text x="660" y="340" font-family="Georgia, serif" font-size="14" fill="#D4A574">One-sentence paragraphs:</text>
    <rect x="660" y="350" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="660" y="350" width="0" height="24" rx="4" fill="#D4A574"/>
    <text x="870" y="368" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">0%</text>

    <!-- Sentence length -->
    <text x="660" y="405" font-family="Georgia, serif" font-size="14" fill="#D4A574">Average sentence length:</text>
    <rect x="660" y="415" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="660" y="415" width="142" height="24" rx="4" fill="#D4A574"/>
    <text x="870" y="433" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">17 words</text>

    <!-- Pronoun "you" -->
    <text x="660" y="470" font-family="Georgia, serif" font-size="14" fill="#D4A574">Pronoun "you" density:</text>
    <rect x="660" y="480" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="660" y="480" width="52" height="24" rx="4" fill="#D4A574"/>
    <text x="870" y="498" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">1.3 per 100</text>

    <!-- Reading level -->
    <text x="660" y="535" font-family="Georgia, serif" font-size="14" fill="#D4A574">Reading level:</text>
    <rect x="660" y="545" width="200" height="24" rx="4" fill="#334155"/>
    <rect x="660" y="545" width="160" height="24" rx="4" fill="#D4A574"/>
    <text x="870" y="563" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f8fafc">Grade 11-12</text>

    <!-- Voice Pattern -->
    <text x="660" y="600" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#f8fafc">Voice Pattern:</text>
    <text x="660" y="625" font-family="Georgia, serif" font-size="14" fill="#94A3B8" style="font-style: italic;">
      <tspan x="660" dy="0">"I'm reporting TO you"</tspan>
      <tspan x="660" dy="20">Logical blocks for structured</tspan>
      <tspan x="660" dy="20">reasoning. Formal authority.</tspan>
    </text>

    <!-- Best Use -->
    <text x="660" y="700" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#D4A574">Best for:</text>
    <text x="660" y="720" font-family="Georgia, serif" font-size="13" fill="#94A3B8">Strategic analysis, thought leadership</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="775" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#64748B">
    Both voices tested on identical AI topics. 80-year time gap irrelevant to voice authenticity.
  </text>
</svg>
